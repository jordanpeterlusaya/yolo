<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — YOLO Real Estate</title>
  <link rel="icon" href="/assets/logo.png" type="image/png">
  <link rel="stylesheet" href="/css/style.css">
</head>
<body>
  <header>
    <a href="/" class="logo">
      <img src="/assets/logo.png" alt="YOLO Real Estate" class="logo-img">
    </a>
    <a href="/">View Site</a>
  </header>

  <div class="admin-page">
    <div class="login-box" id="loginBox">
      <h1>Admin Login</h1>
      <label>Password</label>
      <input type="password" id="password" placeholder="Enter password">
      <button class="btn btn-primary" onclick="login()">Login</button>
    </div>

    <div id="dashboard" class="hidden">
      <h1>Manage Properties</h1>
      <div class="admin-form">
        <h2 id="formTitle">Add Property</h2>
        <input type="hidden" id="editId">
        <label>Title *</label>
        <input type="text" id="title">
        <label>Description *</label>
        <textarea id="description" rows="3"></textarea>
        <label>Price (TZS) *</label>
        <input type="number" id="price">
        <label>Listing Type</label>
        <select id="listingType"><option value="rent">For Rent</option><option value="sale">For Buy</option></select>
        <label>Property Type</label>
        <select id="propertyType">
          <option value="house">House</option><option value="apartment">Apartment</option>
          <option value="room">Room</option><option value="land">Land</option><option value="commercial">Commercial</option>
        </select>
        <label>Location *</label>
        <input type="text" id="location">
        <label>City *</label>
        <input type="text" id="city">
        <label>Bedrooms</label>
        <input type="number" id="bedrooms" value="0">
        <label>Bathrooms</label>
        <input type="number" id="bathrooms" value="0">
        <label>Area (sqft)</label>
        <input type="number" id="area" value="0">
        <label>Image URL</label>
        <input type="text" id="image" placeholder="https://...">
        <label><input type="checkbox" id="featured"> Featured</label>
        <button class="btn btn-primary" onclick="saveProperty()">Save</button>
        <button class="btn btn-secondary hidden" id="cancelBtn" onclick="resetForm()">Cancel</button>
      </div>
      <div class="admin-list">
        <h2>Listings (<span id="count">0</span>)</h2>
        <table class="admin-table">
          <thead><tr><th>Image</th><th>Title</th><th>Price</th><th>Actions</th></tr></thead>
          <tbody id="tableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
